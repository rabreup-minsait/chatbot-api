<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e23;
    --border: #2a2a32;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124, 106, 247, 0.15);
    --text: #e8e8f0;
    --text-muted: #7878a0;
    --bubble-bot: #1e1e28;
    --bubble-user: #2d2060;
    --success: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    padding: 0 16px;
  }
  .header {
    padding: 24px 8px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #c084fc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .header-info h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.01em; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); font-weight: 300; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease forwards; opacity: 0; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .message.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), #c084fc); box-shadow: 0 0 12px var(--accent-glow); }
  .message.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; font-weight: 300; }
  .message.bot .bubble { background: var(--bubble-bot); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; }
  .message.user .bubble { background: var(--bubble-user); border: 1px solid rgba(124,106,247,0.3); border-radius: 16px 4px 16px 16px; }
  .typing { display: flex; gap: 10px; animation: fadeUp 0.3s ease forwards; opacity: 0; }
  .typing-bubble { background: var(--bubble-bot); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  .input-area { padding: 16px 8px 24px; border-top: 1px solid var(--border); }
  .input-wrapper {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 300; resize: none; line-height: 1.5;
    max-height: 120px; min-height: 24px; overflow-y: auto; scrollbar-width: none;
  }
  textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; box-shadow: 0 0 16px var(--accent-glow);
  }
  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; padding: 40px 0; animation: fadeUp 0.5s ease forwards; opacity: 0; }
  .welcome-icon { width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, var(--accent), #c084fc); display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 0 40px var(--accent-glow); margin-bottom: 8px; }
  .welcome h2 { font-size: 20px; font-weight: 500; text-align: center; }
  .welcome p { font-size: 13px; color: var(--text-muted); text-align: center; font-weight: 300; max-width: 340px; line-height: 1.7; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s; }
  .chip:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-glow); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar"><img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" /></div>
    <div class="header-info">
      <h1>Assistente</h1>
      <div class="status"><div class="status-dot"></div>online</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon"><img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:20px;" /></div>
      <h2>Olá! Como posso ajudar?</h2>
      <p>Sou seu assistente pessoal. Posso lembrar seu nome, seus gostos e responder suas perguntas.</p>
      <div class="chips">
        <div class="chip" onclick="sendChip(this)">meu nome é Renata</div>
        <div class="chip" onclick="sendChip(this)">gosto de café</div>
        <div class="chip" onclick="sendChip(this)">quem eu sou</div>
        <div class="chip" onclick="sendChip(this)">limpar memoria</div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" placeholder="Digite uma mensagem..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter para enviar · Shift+Enter para nova linha</div>
  </div>
</div>
<script>
  const API_URL = 'https://chatbot-api-production-ae7d.up.railway.app/chat';
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendChip(el) { inputEl.value = el.textContent; sendMessage(); }

  function addMessage(text, type) {
    const w = document.getElementById('welcome');
    if (w) w.remove();
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = type === 'bot' ? '<img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing'; t.id = 'typing';
    const a = document.createElement('div');
    a.className = 'msg-avatar';
    a.style.cssText = 'background:linear-gradient(135deg,#7c6af7,#c084fc);box-shadow:0 0 12px rgba(124,106,247,0.15);width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;';
    a.innerHTML = '<img src="https://tse4.mm.bing.net/th/id/OIP.EOaq9JF9QLghQfDKDMndeAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />';
    const b = document.createElement('div');
    b.className = 'typing-bubble';
    b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    t.appendChild(a); t.appendChild(b);
    messagesEl.appendChild(t);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage(text, 'user');
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texto: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.resposta, 'bot');
    } catch (err) {
      hideTyping();
      addMessage('Erro ao conectar com a API. Verifique se o servidor está rodando.', 'bot');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
